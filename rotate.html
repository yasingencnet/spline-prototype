<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotate & Scrub - Spline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="header">
      <div>
        <h1>ScrollTrigger + Rotation</h1>
        <p>Pinned · Scrub · 90° camera orbit · Transparent canvas</p>
      </div>
      <div>
        <a class="link" href="/">Original</a>
        <a class="link" href="/scrub">Scrub</a>
        <a class="link" href="/no-scrub">No Scrub</a>
        <a class="link" href="/rotate">Rotate</a>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="scroll-spacer" id="scrollSpacer2">
          <div class="spline-wrap" id="splineWrap2">
            <canvas id="canvas3d2"></canvas>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

    <script type="module">
      import { Application } from './runtime.js';

      gsap.registerPlugin(ScrollTrigger);

      const ANIM = {
        oring:   { startX: 43.72,  endX: 89.85  },
        gasket:  { startX: 41.44,  endX: 13.24  },
        cathode: { startX: 109.69, endX: 54.77  },
        anode:   { startX: 39.01,  endX: -58.28 },
      };

      const canvas2 = document.getElementById('canvas3d2');
      const app2 = new Application(canvas2, { wasmPath: '/' });

      app2.load('./scene.splinecode').then(() => {
        const gl2 = canvas2.getContext('webgl2');
        const orig2 = gl2.clearColor.bind(gl2);
        gl2.clearColor = (r, g, b, a) => orig2(0, 0, 0, 0);
        gl2.clearColor(0, 0, 0, 0);

        const em2 = app2._eventManager;
        em2.pause();
        app2._renderer.setAnimationLoop(app2.render.bind(app2));

        const meshes2 = {};
        app2.getAllObjects().forEach(obj => {
          if (obj.type === 'Mesh') meshes2[obj.name] = obj;
        });

        for (const [name, d] of Object.entries(ANIM)) {
          if (meshes2[name]) meshes2[name].position.x = d.startX;
        }

        // Camera orbit: manual spherical coordinate approach
        const cam = app2._camera;

        // Compute pivot = average mesh position
        const names = Object.keys(ANIM).filter(n => meshes2[n]);
        const pivotX = names.reduce((s, n) => s + ANIM[n].startX, 0) / names.length;
        const pivotY = names.reduce((s, n) => s + meshes2[n].position.y, 0) / names.length;
        const pivotZ = names.reduce((s, n) => s + meshes2[n].position.z, 0) / names.length;

        // Initial camera offset from pivot
        const cx0 = cam.position.x - pivotX;
        const cy0 = cam.position.y - pivotY;
        const cz0 = cam.position.z - pivotZ;
        // Radius in XZ plane
        const radius = Math.sqrt(cx0 * cx0 + cz0 * cz0);
        const startAngle = Math.atan2(cx0, cz0);

        // Align camera to lookAt target immediately so there's no jump on first scroll
        cam.lookAt(pivotX, pivotY, pivotZ);

        const proxy2 = { t: 0 };

        gsap.to(proxy2, {
          t: 1,
          ease: 'none',
          scrollTrigger: {
            trigger: '#scrollSpacer2',
            start: 'top top',
            end: 'bottom bottom',
            scrub: true,
          },
          onUpdate() {
            // Separate parts on X
            for (const [name, d] of Object.entries(ANIM)) {
              if (meshes2[name]) {
                meshes2[name].position.x = gsap.utils.interpolate(d.startX, d.endX, proxy2.t);
              }
            }

            // Orbit camera around pivot in XZ plane
            const angle = startAngle + proxy2.t * (Math.PI / 2);
            cam.position.x = pivotX + radius * Math.sin(angle);
            cam.position.z = pivotZ + radius * Math.cos(angle);
            // Y stays the same
            cam.lookAt(pivotX, pivotY, pivotZ);
          },
        });
      });
    </script>
  </body>
</html>
