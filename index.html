<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Original - Spline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Original Spline</h1>
        <p>No scroll control. Auto plays on load.</p>
      </div>
      <div>
        <a class="link" href="/">Original</a>
        <a class="link" href="/scrub">Scrub</a>
        <a class="link" href="/no-scrub">No Scrub</a>
        <a class="link" href="/rotate">Rotate</a>
      </div>
    </header>

    <main>
      <section class="section">
          <canvas id="original"></canvas>
      </section>
    </main>

    <script src="script.js"></script>

    <script type="module">
      import { Application } from './runtime.js';

      // ── Original: auto-plays on load (no scroll control) ──
      const originalCanvas = document.getElementById('original');
      const originalApp = new Application(originalCanvas, { wasmPath: '/' });
      originalApp.load('./scene.splinecode');
    </script>
  </body>
</html>
